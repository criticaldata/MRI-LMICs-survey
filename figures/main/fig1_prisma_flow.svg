<svg xmlns="http://www.w3.org/2000/svg" width="170mm" height="135mm" viewBox="0 0 900 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5D6D7E"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C73E1D"/>
    </marker>
  </defs>

  <!-- ══════════════ STAGE LABELS (left side) ══════════════ -->
  <text x="18" y="105" font-size="9" font-weight="bold" fill="#2E86AB" transform="rotate(-90,18,105)">IDENTIFICATION</text>
  <text x="18" y="230" font-size="9" font-weight="bold" fill="#2E86AB" transform="rotate(-90,18,230)">SCREENING</text>
  <text x="18" y="380" font-size="9" font-weight="bold" fill="#1E8449" transform="rotate(-90,18,380)">ELIGIBILITY</text>
  <text x="18" y="510" font-size="9" font-weight="bold" fill="#1E8449" transform="rotate(-90,18,510)">INCLUSION</text>

  <!-- ══════════════ IDENTIFICATION ══════════════ -->
  <rect x="120" y="66" width="460" height="70" rx="14" fill="#EBF5FB" stroke="#2E86AB" stroke-width="2"/>
  <text x="350" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A5276">Records identified through database searching</text>
  <text x="350" y="112" text-anchor="middle" font-size="11" fill="#5D6D7E">PubMed, IEEE Xplore, Scopus, Google Scholar</text>
  <text x="350" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E86AB">(n = 183)</text>

  <!-- Arrow down -->
  <line x1="350" y1="136" x2="350" y2="162" stroke="#5D6D7E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ══════════════ DEDUP ══════════════ -->
  <rect x="170" y="168" width="360" height="42" rx="12" fill="#F8F9F9" stroke="#95A5A6" stroke-width="1.5"/>
  <text x="350" y="194" text-anchor="middle" font-size="11.5" fill="#2C3E50">Records after duplicate removal <tspan font-weight="bold" fill="#5D6D7E">(n = 172)</tspan></text>

  <!-- Arrow down -->
  <line x1="350" y1="210" x2="350" y2="236" stroke="#5D6D7E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ══════════════ SCREENING ══════════════ -->
  <rect x="150" y="242" width="400" height="46" rx="12" fill="#EBF5FB" stroke="#2E86AB" stroke-width="2"/>
  <text x="350" y="270" text-anchor="middle" font-size="12" fill="#1A5276">Title and abstract screening <tspan font-weight="bold">(n = 172)</tspan></text>

  <!-- Arrow right to exclusion -->
  <line x1="550" y1="265" x2="630" y2="265" stroke="#C73E1D" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- Exclusion box 1 -->
  <rect x="636" y="244" width="170" height="44" rx="10" fill="#FDEDEC" stroke="#C73E1D" stroke-width="1.5"/>
  <text x="721" y="262" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#922B21">Excluded (n = 68)</text>
  <text x="721" y="278" text-anchor="middle" font-size="9.5" fill="#5D6D7E">Not relevant to scope</text>

  <!-- Arrow down -->
  <line x1="350" y1="288" x2="350" y2="318" stroke="#5D6D7E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ══════════════ ELIGIBILITY ══════════════ -->
  <rect x="130" y="324" width="440" height="46" rx="12" fill="#EBF5FB" stroke="#2E86AB" stroke-width="2"/>
  <text x="350" y="352" text-anchor="middle" font-size="12" fill="#1A5276">Full-text articles assessed for eligibility <tspan font-weight="bold">(n = 104)</tspan></text>

  <!-- Arrow right to exclusion -->
  <line x1="570" y1="347" x2="630" y2="347" stroke="#C73E1D" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- Exclusion box 2 -->
  <rect x="636" y="308" width="230" height="135" rx="10" fill="#FDEDEC" stroke="#C73E1D" stroke-width="1.5"/>
  <text x="751" y="328" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#922B21">Excluded (n = 53)</text>
  <line x1="656" y1="336" x2="846" y2="336" stroke="#F5B7B1" stroke-width="1"/>
  <text x="662" y="354" font-size="10" fill="#2C3E50">Not SR-focused: 22</text>
  <text x="662" y="370" font-size="10" fill="#2C3E50">Not MRI modality: 11</text>
  <text x="662" y="386" font-size="10" fill="#2C3E50">Duplicate data: 7</text>
  <text x="662" y="402" font-size="10" fill="#2C3E50">No AI/DL method: 6</text>
  <text x="662" y="418" font-size="10" fill="#2C3E50">Review/survey only: 5</text>
  <text x="662" y="434" font-size="10" fill="#2C3E50">Conference abstract: 2</text>

  <!-- Arrow down -->
  <line x1="350" y1="370" x2="350" y2="456" stroke="#5D6D7E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ══════════════ INCLUDED ══════════════ -->
  <rect x="160" y="462" width="380" height="60" rx="14" fill="#EAFAF1" stroke="#1E8449" stroke-width="2.5"/>
  <text x="350" y="488" text-anchor="middle" font-size="14" font-weight="bold" fill="#0E6655">Studies included in narrative review</text>
  <text x="350" y="510" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E8449">(n = 51)</text>

  <!-- Three arrows down to breakdown -->
  <line x1="200" y1="522" x2="155" y2="556" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="522" x2="350" y2="556" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="522" x2="545" y2="556" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════ BREAKDOWN BOXES ══════════════ -->
  <!-- By Application -->
  <rect x="40" y="562" width="230" height="120" rx="10" fill="#EBF5FB" stroke="#2E86AB" stroke-width="1.5"/>
  <text x="155" y="580" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1A5276">By Application Area</text>
  <line x1="60" y1="588" x2="250" y2="588" stroke="#D4E6F1" stroke-width="1"/>
  <text x="68" y="606" font-size="10.5" fill="#2C3E50">Brain MRI: <tspan font-weight="bold">26</tspan> (51%)</text>
  <text x="68" y="624" font-size="10.5" fill="#2C3E50">Musculoskeletal: <tspan font-weight="bold">7</tspan> (14%)</text>
  <text x="68" y="642" font-size="10.5" fill="#2C3E50">Cardiac: <tspan font-weight="bold">4</tspan> (8%)</text>
  <text x="68" y="660" font-size="10.5" fill="#2C3E50">Other: <tspan font-weight="bold">14</tspan> (27%)</text>

  <!-- By Architecture -->
  <rect x="290" y="562" width="230" height="120" rx="10" fill="#FEF9E7" stroke="#F18F01" stroke-width="1.5"/>
  <text x="405" y="580" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#7D6608">By Architecture</text>
  <line x1="310" y1="588" x2="500" y2="588" stroke="#FAD7A0" stroke-width="1"/>
  <text x="318" y="606" font-size="10.5" fill="#2C3E50">CNN: <tspan font-weight="bold">25</tspan> (49%)</text>
  <text x="318" y="624" font-size="10.5" fill="#2C3E50">U-Net: <tspan font-weight="bold">11</tspan> (22%)</text>
  <text x="318" y="642" font-size="10.5" fill="#2C3E50">Hybrid: <tspan font-weight="bold">6</tspan> (12%)</text>
  <text x="318" y="660" font-size="10.5" fill="#2C3E50">GAN + Other: <tspan font-weight="bold">9</tspan> (18%)</text>

  <!-- By Field Strength -->
  <rect x="540" y="562" width="230" height="120" rx="10" fill="#EAFAF1" stroke="#1E8449" stroke-width="1.5"/>
  <text x="655" y="580" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#0E6655">By Field Strength</text>
  <line x1="560" y1="588" x2="750" y2="588" stroke="#A9DFBF" stroke-width="1"/>
  <text x="568" y="606" font-size="10.5" fill="#2C3E50">Low-field: <tspan font-weight="bold">10</tspan> (20%)</text>
  <text x="568" y="624" font-size="10.5" fill="#2C3E50">Standard: <tspan font-weight="bold">17</tspan> (33%)</text>
  <text x="568" y="642" font-size="10.5" fill="#2C3E50">Mixed: <tspan font-weight="bold">6</tspan> (12%)</text>
  <text x="568" y="660" font-size="10.5" fill="#2C3E50">Not specified: <tspan font-weight="bold">17</tspan> (33%)</text>
</svg>
