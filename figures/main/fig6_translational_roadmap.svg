<svg xmlns="http://www.w3.org/2000/svg" width="170mm" height="110mm" viewBox="0 0 900 580" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E86AB"/>
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1E8449"/>
    </marker>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C73E1D"/>
    </marker>
    <marker id="a4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F18F01"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B2631">Translational Roadmap: From MRI Super-Resolution Research to LMIC Deployment</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#7f8c8d" font-style="italic">Barriers, enablers, and a proposed research agenda for equitable imaging</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- CURRENT STATE (left column) -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="30" y="70" width="250" height="200" rx="14" fill="#EBF5FB" stroke="#2E86AB" stroke-width="2"/>
  <text x="155" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A5276">Current State</text>
  <text x="155" y="114" text-anchor="middle" font-size="10.5" fill="#5D6D7E" font-style="italic">48 studies reviewed (2020–2025)</text>

  <circle cx="52" cy="140" r="3.5" fill="#2E86AB"/><text x="66" y="144" font-size="11" fill="#2C3E50">48% use CNNs</text>
  <circle cx="52" cy="162" r="3.5" fill="#2E86AB"/><text x="66" y="166" font-size="11" fill="#2C3E50">50% focus on brain MRI</text>
  <circle cx="52" cy="184" r="3.5" fill="#2E86AB"/><text x="66" y="188" font-size="11" fill="#2C3E50">Median PSNR: 32.6 dB</text>
  <circle cx="52" cy="206" r="3.5" fill="#2E86AB"/><text x="66" y="210" font-size="11" fill="#2C3E50">Median SSIM: 0.917</text>
  <circle cx="52" cy="228" r="3.5" fill="#2E86AB"/><text x="66" y="232" font-size="11" fill="#2C3E50">33% field strength unspecified</text>
  <circle cx="52" cy="250" r="3.5" fill="#2E86AB"/><text x="66" y="254" font-size="11" fill="#2C3E50">Median LMIC score: 3/5</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- BARRIERS (center-top) -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="325" y="70" width="250" height="200" rx="14" fill="#FDEDEC" stroke="#C73E1D" stroke-width="2"/>
  <text x="450" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21">Key Barriers</text>
  <text x="450" y="114" text-anchor="middle" font-size="10.5" fill="#5D6D7E" font-style="italic">Gaps identified in this review</text>

  <circle cx="347" cy="140" r="3.5" fill="#C73E1D"/><text x="361" y="144" font-size="11" fill="#2C3E50">Only 29% mention low-field MRI</text>
  <circle cx="347" cy="162" r="3.5" fill="#C73E1D"/><text x="361" y="166" font-size="11" fill="#2C3E50">Only 13% share code publicly</text>
  <circle cx="347" cy="184" r="3.5" fill="#C73E1D"/><text x="361" y="188" font-size="11" fill="#2C3E50">60% lack clinical validation</text>
  <circle cx="347" cy="206" r="3.5" fill="#C73E1D"/><text x="361" y="210" font-size="11" fill="#2C3E50">8% directly target LMICs (Score 5)</text>
  <circle cx="347" cy="228" r="3.5" fill="#C73E1D"/><text x="361" y="232" font-size="11" fill="#2C3E50">Sparse standardized benchmarks</text>
  <circle cx="347" cy="250" r="3.5" fill="#C73E1D"/><text x="361" y="254" font-size="11" fill="#2C3E50">Limited anatomical diversity</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- ENABLERS (right column) -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="620" y="70" width="250" height="200" rx="14" fill="#EAFAF1" stroke="#1E8449" stroke-width="2"/>
  <text x="745" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#0E6655">Enablers</text>
  <text x="745" y="114" text-anchor="middle" font-size="10.5" fill="#5D6D7E" font-style="italic">Opportunities for translation</text>

  <circle cx="642" cy="140" r="3.5" fill="#1E8449"/><text x="656" y="144" font-size="11" fill="#2C3E50">Portable MRI (Hyperfine, 64mT)</text>
  <circle cx="642" cy="162" r="3.5" fill="#1E8449"/><text x="656" y="166" font-size="11" fill="#2C3E50">69% address resource constraints</text>
  <circle cx="642" cy="184" r="3.5" fill="#1E8449"/><text x="656" y="188" font-size="11" fill="#2C3E50">40% have high LMIC relevance</text>
  <circle cx="642" cy="206" r="3.5" fill="#1E8449"/><text x="656" y="210" font-size="11" fill="#2C3E50">Transfer learning from 3T to LF</text>
  <circle cx="642" cy="228" r="3.5" fill="#1E8449"/><text x="656" y="232" font-size="11" fill="#2C3E50">Lightweight architectures emerging</text>
  <circle cx="642" cy="250" r="3.5" fill="#1E8449"/><text x="656" y="254" font-size="11" fill="#2C3E50">Growing open-source ecosystem</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- ARROWS: Current -> Barriers, Barriers -> Enablers -->
  <!-- ════════════════════════════════════════════════ -->
  <path d="M280,170 L325,170" stroke="#5D6D7E" stroke-width="2" fill="none" marker-end="url(#a3)"/>
  <path d="M575,170 L620,170" stroke="#5D6D7E" stroke-width="2" fill="none" marker-end="url(#a2)"/>

  <!-- ════════════════════════════════════════════════ -->
  <!-- RESEARCH AGENDA (bottom wide box) -->
  <!-- ════════════════════════════════════════════════ -->
  <path d="M155,270 L155,310" stroke="#2E86AB" stroke-width="2" fill="none" marker-end="url(#a1)"/>
  <path d="M450,270 L450,310" stroke="#C73E1D" stroke-width="2" fill="none" marker-end="url(#a4)"/>
  <path d="M745,270 L745,310" stroke="#1E8449" stroke-width="2" fill="none" marker-end="url(#a2)"/>

  <rect x="30" y="320" width="840" height="250" rx="16" fill="#FFF8E1" stroke="#F18F01" stroke-width="2.5"/>
  <text x="450" y="350" text-anchor="middle" font-size="15" font-weight="bold" fill="#7D6608">Proposed Research Agenda for LMIC-Ready MRI Super-Resolution</text>

  <!-- Three columns inside -->
  <!-- Column 1: Technical -->
  <rect x="50" y="370" width="250" height="180" rx="10" fill="white" stroke="#2E86AB" stroke-width="1.5"/>
  <text x="175" y="394" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A5276">Technical Priorities</text>
  <line x1="70" y1="404" x2="280" y2="404" stroke="#D5D8DC" stroke-width="1"/>

  <circle cx="68" cy="424" r="3" fill="#2E86AB"/><text x="80" y="428" font-size="10.5" fill="#2C3E50">Domain adaptation: 3T → 0.064T</text>
  <circle cx="68" cy="448" r="3" fill="#2E86AB"/><text x="80" y="452" font-size="10.5" fill="#2C3E50">Efficient architectures for edge</text>
  <circle cx="68" cy="472" r="3" fill="#2E86AB"/><text x="80" y="476" font-size="10.5" fill="#2C3E50">Federated learning for data scarcity</text>
  <circle cx="68" cy="496" r="3" fill="#2E86AB"/><text x="80" y="500" font-size="10.5" fill="#2C3E50">Multi-anatomy SR generalization</text>
  <circle cx="68" cy="520" r="3" fill="#2E86AB"/><text x="80" y="524" font-size="10.5" fill="#2C3E50">Standardized benchmarking protocols</text>

  <!-- Column 2: Clinical -->
  <rect x="325" y="370" width="250" height="180" rx="10" fill="white" stroke="#C73E1D" stroke-width="1.5"/>
  <text x="450" y="394" text-anchor="middle" font-size="12" font-weight="bold" fill="#922B21">Clinical Validation</text>
  <line x1="345" y1="404" x2="555" y2="404" stroke="#D5D8DC" stroke-width="1"/>

  <circle cx="343" cy="424" r="3" fill="#C73E1D"/><text x="355" y="428" font-size="10.5" fill="#2C3E50">Multi-reader studies in LMIC sites</text>
  <circle cx="343" cy="448" r="3" fill="#C73E1D"/><text x="355" y="452" font-size="10.5" fill="#2C3E50">Diagnostic accuracy on low-field</text>
  <circle cx="343" cy="472" r="3" fill="#C73E1D"/><text x="355" y="476" font-size="10.5" fill="#2C3E50">Prospective clinical trials</text>
  <circle cx="343" cy="496" r="3" fill="#C73E1D"/><text x="355" y="500" font-size="10.5" fill="#2C3E50">Workflow integration assessment</text>
  <circle cx="343" cy="520" r="3" fill="#C73E1D"/><text x="355" y="524" font-size="10.5" fill="#2C3E50">Cost-effectiveness analysis</text>

  <!-- Column 3: Implementation -->
  <rect x="600" y="370" width="250" height="180" rx="10" fill="white" stroke="#1E8449" stroke-width="1.5"/>
  <text x="725" y="394" text-anchor="middle" font-size="12" font-weight="bold" fill="#0E6655">Implementation &amp; Equity</text>
  <line x1="620" y1="404" x2="830" y2="404" stroke="#D5D8DC" stroke-width="1"/>

  <circle cx="618" cy="424" r="3" fill="#1E8449"/><text x="630" y="428" font-size="10.5" fill="#2C3E50">Open-source model repositories</text>
  <circle cx="618" cy="448" r="3" fill="#1E8449"/><text x="630" y="452" font-size="10.5" fill="#2C3E50">LMIC researcher partnerships</text>
  <circle cx="618" cy="472" r="3" fill="#1E8449"/><text x="630" y="476" font-size="10.5" fill="#2C3E50">Regulatory pathway guidance</text>
  <circle cx="618" cy="496" r="3" fill="#1E8449"/><text x="630" y="500" font-size="10.5" fill="#2C3E50">Training data diversity initiatives</text>
  <circle cx="618" cy="520" r="3" fill="#1E8449"/><text x="630" y="524" font-size="10.5" fill="#2C3E50">Technology readiness framework</text>
</svg>
